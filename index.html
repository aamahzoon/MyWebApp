<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اپلیکیشن من</title>
    <style>
        body {
            font-family: 'Tahoma', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        input {
            width: 80%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            margin: 10px 0;
            transition: 0.3s;
        }
        input:focus {
            border-color: #667eea;
            outline: none;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            margin: 10px 0;
        }
        button:hover {
            background: #764ba2;
            transform: scale(1.05);
        }
        #result {
            margin-top: 20px;
            font-size: 18px;
            color: #333;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 10px;
            min-height: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌟 سلام!</h1>
        <p>نام خود را وارد کنید:</p>
        <input type="text" id="nameInput" placeholder="مثلاً: علی">
        <br>
        <button onclick="sayHello()">سلام کن!</button>
        <div id="result">👋 منتظر شما هستم...</div>
    </div>

    <script>
        function sayHello() {
            const name = document.getElementById('nameInput').value;
            const resultDiv = document.getElementById('result');
            
            if (name.trim() === '') {
                resultDiv.innerHTML = '⚠️ لطفاً نام خود را وارد کنید!';
                resultDiv.style.background = '#ffe0e0';
            } else {
                resultDiv.innerHTML = `🎉 سلام ${name}! خوش آمدی به اپلیکیشن من!`;
                resultDiv.style.background = '#e0f7e0';
            }
        }
        
        // قابلیت زدن Enter
        document.getElementById('nameInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sayHello();
            }
        });
    </script>
</body>
</html>
